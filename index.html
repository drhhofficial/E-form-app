<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>وحدة تكنولوجيا المعلومات</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#c9a84c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="وحدة IT">
  <meta name="description" content="نظام إدارة وحدة تكنولوجيا المعلومات - كلية العلوم جامعة طنطا">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple Icons -->
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: #0a1628;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0a1628, #112240);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #splash .logo {
      font-size: 72px;
      margin-bottom: 24px;
      animation: pulse 1.5s infinite;
    }

    #splash h1 {
      font-family: 'Amiri', serif;
      font-size: 22px;
      color: #f5f0e8;
      text-align: center;
      margin-bottom: 8px;
    }

    #splash p {
      font-size: 13px;
      color: #c9a84c;
      text-align: center;
      margin-bottom: 40px;
    }

    #splash .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(201,168,76,0.2);
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    #app-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>

  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <div class="logo">🖥️</div>
    <h1>وحدة تكنولوجيا المعلومات</h1>
    <p>كلية العلوم — جامعة طنطا</p>
    <div class="loader"></div>
  </div>

  <script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbw4kiRnpa1vvqJKWQk5lNLCpdcy9wNjA7d_hkZOnB9EMIqHjbfvGcSvzVbbwKyJqNRj/exec';

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Redirect after splash
    setTimeout(() => {
      window.location.replace(APP_URL);
    }, 1500);
  </script>
</body>
</html>
